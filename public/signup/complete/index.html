<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>카센더 가입 완료</title>
    <style>
      :root {
        color: #111827;
        background: #f6f7fb;
        font-family:
          "Pretendard",
          "Apple SD Gothic Neo",
          "Malgun Gothic",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 20px;
        background:
          radial-gradient(circle at top, rgba(255, 214, 0, 0.16), transparent 34rem),
          #f6f7fb;
      }

      .card {
        width: min(100%, 430px);
        padding: 32px 22px;
        border: 1px solid #e4e7ee;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
        text-align: center;
      }

      img {
        width: min(64vw, 230px);
        height: auto;
      }

      h1 {
        margin: 22px 0 10px;
        font-size: 27px;
        line-height: 1.25;
      }

      p {
        margin: 0;
        color: #536177;
        font-size: 15px;
        line-height: 1.65;
      }

      .actions {
        display: grid;
        gap: 10px;
        margin-top: 24px;
      }

      a {
        min-height: 50px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 800;
      }

      .primary {
        background: #111827;
        color: #fff;
      }

      .secondary {
        border: 1px solid #d7dde8;
        color: #334155;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="/logo.png" alt="카센더" />
      <h1>가입이 완료되었습니다</h1>
      <p>
        이제 PC에서 카센더 앱을 실행하고<br />
        방금 인증한 카카오 계정과 같은 계정으로 로그인해 주세요.
      </p>
      <div class="actions">
        <a class="primary" href="/#download">카센더 다운로드</a>
        <a class="secondary" href="/">홈으로 이동</a>
      </div>
    </main>
  </body>
</html>
